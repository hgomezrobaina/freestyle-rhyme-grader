version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: freestyle_postgres
    environment:
      POSTGRES_USER: freestyle_user
      POSTGRES_PASSWORD: freestyle_password
      POSTGRES_DB: freestyle_callificator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U freestyle_user -d freestyle_callificator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - freestyle_network

  redis:
    image: redis:7-alpine
    container_name: freestyle_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - freestyle_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freestyle_backend
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - ./app:/app/app
      - ./analysis:/app/analysis
      - ./uploads:/app/uploads
      - ./temp:/app/temp
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - freestyle_network

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freestyle_celery_worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env.docker
    volumes:
      - ./app:/app/app
      - ./analysis:/app/analysis
      - ./uploads:/app/uploads
      - ./temp:/app/temp
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - freestyle_network

volumes:
  postgres_data:

networks:
  freestyle_network:
    driver: bridge
